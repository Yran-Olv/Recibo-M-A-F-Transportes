# M.A.F — modelo de referência. Em produção o install.sh gera
# /etc/nginx/sites-available/maf-recibos automaticamente.

upstream maf_recibos_app {
    server 127.0.0.1:3010;
    keepalive 8;
}

# Redireciona HTTP → HTTPS (descomente após Certbot ou use o bloco que o certbot cria)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name recibos.seudominio.com.br;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name recibos.seudominio.com.br;

    client_max_body_size 4M;

    location / {
        proxy_pass http://maf_recibos_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# Após certbot --nginx, o Certbot costuma adicionar um server { listen 443 ssl; ... }
# com os mesmos proxy_set_header. Confira com: sudo nginx -T | grep -A30 maf
